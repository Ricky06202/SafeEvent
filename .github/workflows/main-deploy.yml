name: Deploy Multi-Stack (Astro & Hono)

on:
  push:
    branches: [ main ] # Se activa al hacer push a main

jobs:
  # --- TRABAJO 1: COMPILAR Y SUBIR ASTRO (Frontend) ---
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versión recomendada para Astro
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install & Build Astro
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Deploy Frontend to cPanel (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Astro por defecto genera todo en la carpeta dist
          local-dir: ./frontend/dist/ 
          server-dir: /safeevent.rsanjur.com/ # Cambia a tu ruta real en cPanel

  # --- TRABAJO 2: SUBIR HONO (Backend) ---
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Hono suele ser TypeScript, así que necesitamos compilarlo antes de subirlo
      - name: Install & Build Hono
        working-directory: ./backend
        run: |
          npm install
          npm run build
          cp package.json dist/
          cp package-lock.json dist/

      - name: Deploy Backend to cPanel (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Subimos la carpeta dist de Hono y los node_modules necesarios (o el bundle generado)
          local-dir: ./backend/dist/ 
          server-dir: /safeevent.rsanjur.com/api/ # Tu subdominio de backend en cPanel
